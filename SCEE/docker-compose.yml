version: '3.8'

services:
  db:
    image: mariadb:latest
    container_name: scee_db
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      TZ: America/Argentina/Mendoza
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - scee_network

  redis:
    image: redis:alpine
    container_name: scee_redis
    environment:
      - TZ=America/Argentina/Mendoza
    networks:
      - scee_network

  server:
    build: .
    container_name: scee_server
    command: python main_server.py
    ports:
      - "5001:5001"
    depends_on:
      - db
      - redis
    env_file: .env
    environment:
      - TZ=America/Argentina/Mendoza
    networks:
      - scee_network

  worker:
    build: .
    container_name: scee_worker
    command: celery -A tasks worker --loglevel=info
    depends_on:
      - redis
      - db
    env_file: .env
    environment:
      - TZ=America/Argentina/Mendoza
    networks:
      - scee_network

  beat:
    build: .
    container_name: scee_beat
    command: celery -A tasks beat --loglevel=info
    depends_on:
      - redis
    env_file: .env
    environment:
      - TZ=America/Argentina/Mendoza
    networks:
      - scee_network

networks:
  scee_network:
    driver: bridge