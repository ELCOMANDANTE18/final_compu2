version: '3.8'

services:
  # 1. Base de Datos (MariaDB)
  db:
    image: mariadb:10.11
    container_name: scee_db
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_PASSWORD}
      MARIADB_DATABASE: ${DB_NAME}
      MARIADB_USER: ${DB_USER}
      MARIADB_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - ./db_data:/var/lib/mysql

  # 2. Broker de Mensajes (Redis)
  redis:
    image: redis:7-alpine
    container_name: scee_redis
    ports:
      - "6379:6379"

  # 3. Servidor Principal SCEE
  server:
    build: .
    container_name: scee_server
    depends_on:
      - db
      - redis
    ports:
      - "5000:5000"
    environment:
      - DB_HOST=db
      - REDIS_URL=redis://redis:6379/0
    env_file:
      - .env
    volumes:
      - ./uploads:/app/uploads

  # 4. Worker de Celery
  worker:
    build: .
    container_name: scee_worker
    command: celery -A src.task worker --loglevel=info
    depends_on:
      - redis
      - db
    environment:
      - DB_HOST=db
      - REDIS_URL=redis://redis:6379/0
    env_file:
      - .env